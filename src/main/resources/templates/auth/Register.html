<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Reader — Inscription</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-page">

    <div class="carte-auth">

        <div class="logo-auth">
            <span class="icone">📚</span>
            <h1>Best Reader</h1>
            <p>Créez votre compte gratuitement</p>
        </div>

        <div class="message-erreur" id="messageErreur"></div>
        <div class="message-succes" id="messageSucces"></div>

        <form id="formulaireInscription">
            <div class="champ-formulaire">
                <label>Nom complet</label>
                <input type="text" id="nomComplet"
                       placeholder="Chery Yann"
                       required>
            </div>
            <div class="champ-formulaire">
                <label>Nom d'utilisateur</label>
                <input type="text" id="nomUtilisateur"
                       placeholder="yann"
                       required>
            </div>
            <div class="champ-formulaire">
                <label>Adresse email</label>
                <input type="email" id="email"
                       placeholder="Chery@gmail.com"
                       required>
            </div>
            <div class="champ-formulaire">
                <label>Mot de passe</label>
                <input type="password" id="motDePasse"
                       placeholder="••••••••" required
                       minlength="8">
            </div>
           <div class="champ-formulaire">
                     <label>Confirmer le mot de passe</label>
                      <input type="password" id="confirmerMotDePasse"
                             placeholder="••••••••" required
                              minlength="8">
                <div class="force-mdp" id="forceMdp"></div>
                <div class="texte-force" id="texteForceMdp"></div>
            </div>

            <button type="submit" class="btn-auth">
                Créer mon compte
            </button>
        </form>

        <div class="lien-auth">
            Déjà un compte ?
            <a th:href="@{/auth/Login}">Se connecter</a>
        </div>

    </div>

    <script th:src="@{/js/auth.js}"></script>
</body>
</html>
