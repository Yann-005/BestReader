# Best Reader - Configuration PostgreSQL compatible Render/Docker/local

spring.application.name=Best_Reader
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bestreader_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# Upload de fichiers (PDF, Word, TXT, EPUB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT - changer JWT_SECRET dans Render
jwt.secret=${JWT_SECRET:BestReaderSecretKey2024SuperSecureKeyChangeMeInRender}
jwt.expiration=${JWT_EXPIRATION:86400000}
